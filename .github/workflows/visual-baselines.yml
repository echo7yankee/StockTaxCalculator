name: Generate visual regression baselines

# Regenerates pixel-exact baselines for the visual-regression spec inside the
# same pinned Playwright Linux Docker image that strict-0-tolerance comparisons
# run against. Triggers on push to the PR-C branch OR manual dispatch from any
# branch that contains this file. Commits baselines back via GITHUB_TOKEN;
# those bot-authored pushes do NOT re-trigger this workflow.
#
# Part of PR-C of the launch-verification tooling
# (09-backlog-and-discipline.md Section 8.1 item #15).

on:
  push:
    branches:
      - feat/section-8-1-15-prc-visual-regression
    paths:
      - '.github/workflows/visual-baselines.yml'
      - 'e2e/visual-regression.spec.ts'
      - 'client/src/**'
      - 'shared/src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.0-jammy
      options: --ipc=host
    env:
      DATABASE_URL: "file:./dev.db"
      CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install dependencies
        # The committed package-lock.json was generated on Windows and is
        # missing Linux-only optional binaries (esbuild, @rollup/rollup-linux-*,
        # etc.). npm has a known bug (https://github.com/npm/cli/issues/4828)
        # where `npm install` against such a lock file still skips the missing
        # platform's optional deps, so dev servers fail to start. Removing
        # the lock on the CI-side (container filesystem only — never pushed
        # back to the repo) lets npm re-resolve for Linux cleanly. The
        # Windows-generated lock stays the source of truth in git.
        run: |
          rm -f package-lock.json
          npm install --prefer-offline --no-audit --progress=false

      - name: Prisma generate + schema push
        working-directory: server
        run: |
          npx prisma generate
          npx prisma db push --skip-generate --accept-data-loss

      - name: Build shared workspace
        # Server imports from @investax/shared/dist; the package entrypoint
        # points at compiled output, so the dist dir must exist before the
        # dev server can start.
        run: npm run build -w shared

      - name: Generate baselines
        # Playwright 1.59 made --update-snapshots take an optional mode; the
        # parser grabs the next token as the mode unless `=` is used, so the
        # test path must come first or be separated by `=all`.
        run: npx playwright test e2e/visual-regression.spec.ts --update-snapshots=all

      - name: Commit baselines to branch
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual-regression.spec.ts-snapshots/ || true
          if git diff --cached --quiet; then
            echo "No baseline changes — nothing to commit."
          else
            git commit -m "[Section 8.1 #15 PR-C] Generate visual regression baselines"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
