name: CI

# Pre-merge verification on every PR to main and every push to main:
#   1. `verify` job (always required): lint + unit tests + full build (~2 min).
#   2. `e2e` job (depends on verify): Playwright E2E across all spec files
#      (~3-5 min). Skips automatically if `verify` fails — no point burning
#      runner minutes on broken PRs. Payment-flow specs auto-skip when
#      LEMON_SQUEEZY_WEBHOOK_SECRET / STRIPE_WEBHOOK_SECRET are absent (they
#      always are in CI), so signature-validation and idempotency suites
#      execute as a smoke check of the surrounding flow only.
#
# History: E2E was deliberately deferred per 09-backlog-and-discipline.md
# Section 8.1 item #16 to keep `verify` runs under 3 min. After Stripe Phase 1
# passed (session #19), Dragos asked for end-to-end coverage on every PR so
# the whole flow doesn't depend on a single manual real-money test for
# regression-safety. E2E is now a parallel-required check.
#
# Still excluded:
# - No nightly cron (deferred post-launch — needs staging env or read-only subset).
# - No auto-deploy on merge (manual SSH stays).

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "1"
      # Required by `prisma generate` + `prisma db push` below; the SQLite file
      # is created under server/ and discarded with the runner.
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.x'

      - name: Cache ~/.npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        # The committed package-lock.json is Windows-generated and is missing
        # Linux-only optional binaries (esbuild, @rollup/rollup-linux-*, etc.).
        # npm has a known bug (https://github.com/npm/cli/issues/4828) where
        # `npm ci` against such a lock file skips those platform optional deps,
        # which then breaks Vite/Rollup. Removing the lock on the CI-side
        # (container filesystem only — never pushed back) lets npm re-resolve
        # for Linux cleanly. Same workaround as .github/workflows/visual-baselines.yml.
        run: |
          rm -f package-lock.json
          npm install --prefer-offline --no-audit --progress=false

      - name: Prisma generate + schema push
        # `generate` produces the @prisma/client TypeScript types that server
        # code imports; `db push` creates the SQLite file + tables so server
        # tests that hit prisma don't get P2021 (table missing).
        working-directory: server
        run: |
          npx prisma generate
          npx prisma db push --skip-generate --accept-data-loss

      - name: Build shared workspace
        # Server tests + server build both resolve @investax/shared via the
        # package's "main" field (dist/index.js). The dist dir must exist
        # before anything that imports from @investax/shared runs.
        run: npm run build -w shared

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # E2E is a hard merge gate. The 16 pre-existing failures present at this
    # job's introduction (session #19, PR #48) were fixed across PRs #49 (timing),
    # #52 (OAuth conditional skip), and #53 (WCAG color-contrast). If a run looks
    # like flake, retry it; do not reintroduce continue-on-error to bypass.
    container:
      # Same pinned Linux image used by .github/workflows/visual-baselines.yml
      # and scripts/verify-visual.ts — browsers + system deps pre-installed
      # so no `playwright install` step is needed.
      image: mcr.microsoft.com/playwright:v1.59.0-jammy
      options: --ipc=host
    env:
      CI: "1"
      # Required by Prisma. SQLite file is written under server/, scoped to
      # the runner filesystem.
      DATABASE_URL: "file:./dev.db"
      # Express session middleware refuses to boot without a secret. Synthetic
      # value is fine — no real users hit this server.
      SESSION_SECRET: "ci-e2e-test-session-secret-not-for-prod"
      # Server reads this for OAuth/redirect URLs; defaults match the dev
      # server Playwright's webServer config spawns on port 5173.
      CLIENT_URL: "http://localhost:5173"
      # Skip visual-regression spec in this generic E2E job — it has its own
      # dedicated workflow (.github/workflows/visual-baselines.yml) and would
      # block unrelated PRs whenever copy/i18n drift moves text widths a few
      # pixels. playwright.config.ts honors this via testIgnore.
      SKIP_VISUAL: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Cache ~/.npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        # Same Windows-lockfile + npm#4828 workaround as the verify job and
        # visual-baselines workflow.
        run: |
          rm -f package-lock.json
          npm install --prefer-offline --no-audit --progress=false

      - name: Prisma generate + schema push
        working-directory: server
        run: |
          npx prisma generate
          npx prisma db push --skip-generate --accept-data-loss

      - name: Build shared workspace
        # Server's runtime imports from @investax/shared/dist. dist/ must
        # exist before the dev server (spawned by Playwright's webServer
        # config) starts.
        run: npm run build -w shared

      - name: Run Playwright E2E
        # webServer config in playwright.config.ts spawns server (3001) and
        # client (5173) dev servers automatically. Visual-regression baselines
        # (e2e/visual-regression.spec.ts-snapshots/) were generated inside
        # this exact Docker image (PR #43, session #14), so strict-zero pixel
        # comparisons should match. If they don't, regenerate via the
        # visual-baselines workflow rather than relaxing tolerance here.
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
