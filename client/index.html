<!DOCTYPE html>
<html lang="ro" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="W4b6TvnkQBGdaV0MvZ-oD_HZcToU6Ul4JZjGsZDac_c" />
    <title>InvesTax | Calculator taxe investitii Romania</title>
    <!-- Per-page meta description, canonical, og:title/description/url/type, twitter:title/description
         are injected at build time by vite-prerender-plugin (see src/prerender.tsx) for prerendered routes,
         and at runtime by react-helmet-async (PageMeta + Helmet) for SPA-fallback routes. -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- OpenGraph universals (per-page og:title/og:description/og:url/og:type are injected per-route) -->
    <meta property="og:image" content="https://investax.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ro_RO" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="InvesTax" />

    <!-- Twitter Card universals (per-page twitter:title/description are injected per-route) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://investax.app/og-image.png" />

    <!-- Additional SEO (canonical is injected per-route) -->
    <link rel="alternate" hreflang="ro" href="https://investax.app/?lng=ro" />
    <link rel="alternate" hreflang="en" href="https://investax.app/?lng=en" />
    <link rel="alternate" hreflang="x-default" href="https://investax.app/?lng=ro" />
    <meta name="theme-color" content="#0B1426" />

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InvesTax",
      "url": "https://investax.app/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "description": "Calculator pentru Declarația Unică (Trading212, Revolut, Interactive Brokers). Câștig net pe metoda CMP, dividende cu credit pentru reținere străină, CASS pe praguri.",
      "inLanguage": ["ro", "en"],
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR",
          "name": "Free"
        },
        {
          "@type": "Offer",
          "price": "19",
          "priceCurrency": "EUR",
          "name": "Pro"
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "InvesTax",
      "url": "https://investax.app/",
      "logo": "https://investax.app/favicon.svg"
    }
    </script>

    <!-- Plausible Analytics -->
    <script defer data-domain="investax.app" src="https://plausible.io/js/script.js"></script>
  </head>
  <body class="bg-white dark:bg-navy-900 text-gray-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
